<title>LALKAAR — The Committee</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --red: #c8102e;
  --deep-red: #7a0018;
  --blood: #4a0010;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --dark: #080808;
  --dark2: #101010;
  --dark3: #181818;
  --text: #e8e0d0;
  --mono: 'Share Tech Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  overflow-x: hidden;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.028; pointer-events: none; z-index: 9999;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 6px);
  pointer-events: none; z-index: 9998;
}

/* HERO */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  padding: 60px 20px;
}
.hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(200,16,46,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 10% 90%, rgba(200,16,46,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 40% 40% at 90% 90%, rgba(201,168,76,0.05) 0%, transparent 50%),
    var(--dark);
}
.hero-mask-bg {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(700px, 90vw);
  opacity: 0.04;
  pointer-events: none;
}
.corner-mask {
  position: absolute;
  width: 120px;
  opacity: 0.06;
  animation: cornerFloat 7s ease-in-out infinite;
}
.corner-mask.tl { top: 40px; left: 40px; animation-delay: 0s; }
.corner-mask.tr { top: 40px; right: 40px; animation-delay: -3.5s; }
.corner-mask.bl { bottom: 80px; left: 40px; animation-delay: -1.5s; }
.corner-mask.br { bottom: 80px; right: 40px; animation-delay: -5s; }
@keyframes cornerFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.hero-content { position: relative; text-align: center; z-index: 2; }
.classified-row {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  margin-bottom: 20px;
}
.classified-line { width: 60px; height: 1px; background: rgba(200,16,46,0.5); }
.classified-text {
  font-family: var(--mono); font-size: 10px;
  color: var(--gold); letter-spacing: 0.5em; text-transform: uppercase;
}
.hero-eyebrow {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.5em; color: rgba(200,16,46,0.7);
  margin-bottom: 8px; text-transform: uppercase;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(70px, 14vw, 160px);
  line-height: 0.85; color: var(--red);
  text-shadow: 0 0 120px rgba(200,16,46,0.35), 6px 6px 0 var(--deep-red), 12px 12px 0 rgba(74,0,16,0.5);
  letter-spacing: 0.03em;
  animation: titleFlicker 8s ease-in-out infinite;
}
@keyframes titleFlicker {
  0%,94%,98%,100% { opacity: 1; } 95% { opacity: 0.92; } 96% { opacity: 1; } 97% { opacity: 0.88; }
}
.hero-sub {
  font-family: 'Crimson Pro', serif; font-style: italic;
  font-size: clamp(18px, 3vw, 28px); font-weight: 300;
  color: var(--gold-light); letter-spacing: 0.2em; margin-top: 10px;
}
.hero-divider {
  width: 200px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--red), var(--gold), var(--red), transparent);
  margin: 24px auto;
}
.hero-desc {
  font-size: 16px; font-style: italic; font-weight: 300;
  color: rgba(232,224,208,0.55); max-width: 480px;
  margin: 0 auto 32px; line-height: 1.7; letter-spacing: 0.05em;
}
.scroll-cue {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; animation: scrollBob 2s ease-in-out infinite; margin-top: 40px;
}
.scroll-cue span { font-family: var(--mono); font-size: 9px; letter-spacing: 0.4em; color: rgba(200,16,46,0.5); }
@keyframes scrollBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

/* STATS BAR */
.stats-bar {
  background: var(--deep-red);
  border-top: 1px solid rgba(200,16,46,0.4);
  border-bottom: 1px solid rgba(200,16,46,0.4);
  padding: 18px 40px;
  display: flex; justify-content: center; gap: 60px; flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--gold-light); line-height: 1; }
.stat-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.3em; color: rgba(232,224,208,0.5); text-transform: uppercase; margin-top: 2px; }

/* SECTION HEAD */
.section-head { text-align: center; padding: 70px 20px 20px; }
.section-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.5em; color: var(--red); text-transform: uppercase; margin-bottom: 10px; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 7vw, 72px); color: #fff; letter-spacing: 0.05em; }
.section-rule { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px auto 0; }

/* FILTER */
.filter-wrap { display: flex; justify-content: center; gap: 8px; padding: 36px 20px 0; flex-wrap: wrap; }
.fbtn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.25em;
  padding: 9px 22px; background: transparent;
  border: 1px solid rgba(200,16,46,0.35); color: rgba(232,224,208,0.6);
  cursor: pointer; transition: all 0.25s; text-transform: uppercase;
  position: relative; overflow: hidden;
}

.fbtn::before {
  content: ''; position: absolute; inset: 0;
  background: var(--red); transform: scaleX(0); transform-origin: left;
  transition: transform 0.25s; z-index: -1;
}
.fbtn:hover::before, .fbtn.on::before { transform: scaleX(1); }
.fbtn:hover, .fbtn.on { color: #fff; border-color: var(--red); }

.sub-filter-wrap {
  display: flex; justify-content: center; gap: 12px;
  padding: 20px 20px 0; flex-wrap: wrap;
  animation: subFilterSlideIn 0.45s cubic-bezier(0.23, 1, 0.32, 1) both;
}
@keyframes subFilterSlideIn {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.sbtn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.3em;
  padding: 10px 26px; text-transform: uppercase;
  background: rgba(114, 87, 13, 0.1);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(59, 13, 13, 0.2);
  color: rgba(182, 64, 43, 0.825);
  cursor: pointer; position: relative; overflow: hidden;
  transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
  box-shadow: 0 0 0 0 rgba(171, 47, 47, 0.607);
}
/* animated gradient sweep on hover */
.sbtn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 0%, rgba(201,168,76,0.12) 40%, rgba(232,199,122,0.18) 60%, transparent 100%);
  transform: translateX(-100%);
  transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
  z-index: 0;
}
/* gold fill for active state */
.sbtn::after {
  content: ''; position: absolute; inset: 0;
  background: transparent;
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.35s  rgba(0, 0, 0, 0);
  z-index: 0;
}
.sbtn span, .sbtn { position: relative; z-index: 1; }
.sbtn:hover {
  border-color: rgb(151, 119, 32);
  color: var(--gold-light);
  box-shadow: 0 0 18px rgb(105, 98, 80), inset 0 0 12px rgba(201,168,76,0.05);
  transform: translateY(-2px);
}
.sbtn:hover::before { transform: translateX(100%); }
.sbtn:active { transform: translateY(0) scale(0.97); }
.sbtn.on::after { transform: scaleX(1); }
.sbtn.on {
  color: var(--dark); font-weight: 700;
  border-color: var(--gold);
  box-shadow: 0 0 22px rgba(124, 33, 0, 0.325), 0 4px 16px rgba(0,0,0,0.3);
  transform: translateY(-1px);
  text-shadow: 0 1px 0 rgba(210, 210, 209, 0.896);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 28px;
  max-width: 1400px;
  margin: 48px auto 0;
  padding: 0 32px 100px;
}

/* CARD */
.cw { perspective: 1100px; height: 480px; cursor: pointer; animation: cardIn 0.55s ease both; }
@keyframes cardIn { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
.ci { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4,0.2,0.2,1); }
.cw:hover .ci { transform: rotateY(180deg); }
.cf { position: absolute; inset: 0; backface-visibility: hidden; overflow: hidden; }

/* FRONT */
.front { background: var(--dark2); border: 1px solid rgba(200,16,46,0.2); }
.front::after {
  content: ''; position: absolute; top: 0; right: 0;
  border-style: solid; border-width: 0 52px 52px 0;
  border-color: transparent rgba(200,16,46,0.7) transparent transparent; z-index: 4;
}
.photo-wrap { position: absolute; inset: 0; }
.photo-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.6s ease, filter 0.6s ease;
  filter: sepia(10%) contrast(1.05);
}
.cw:hover .photo-wrap img { transform: scale(1.05); filter: sepia(50%) contrast(1.1) hue-rotate(-10deg); }
.photo-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  background: linear-gradient(160deg, var(--dark3) 0%, var(--dark2) 100%);
}
.ph-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.25em; color: rgba(200,16,46,0.35); }
.front-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 35%, rgba(0,0,0,0.97) 100%); z-index: 2;
}
.num-badge {
  position: absolute; top: 14px; left: 14px; z-index: 5;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
  color: var(--gold); border: 1px solid rgba(201,168,76,0.35);
  padding: 4px 8px; background: rgba(0,0,0,0.6);
}
.dept-pill {
  position: absolute; bottom: 90px; left: 20px; z-index: 3;
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.25em;
  color: var(--gold); border: 1px solid rgba(201,168,76,0.3);
  padding: 3px 10px; background: rgba(0,0,0,0.5); text-transform: uppercase;
}
.front-info { position: absolute; bottom: 0; left: 0; right: 0; z-index: 3; padding: 20px; }

.fname { font-family: 'Bebas Neue', sans-serif; font-size: 30px; line-height: 1; color: #fff; text-shadow: 0 2px 16px rgba(0,0,0,0.9); }
.frole { font-style: italic; font-size: 14px; font-weight: 300; color: var(--gold-light); margin-top: 3px; }
.mask-mini { position: absolute; bottom: 16px; right: 16px; z-index: 3; opacity: 0.35; width: 28px; }

/* BACK */
.back {
  background: var(--dark2); border: 1px solid rgba(200,16,46,0.25);
  transform: rotateY(180deg); padding: 24px 22px;
  display: flex; flex-direction: column; gap: 12px; position: relative;
}
.back::before {
  content: ''; position: absolute; top: -50px; right: -50px;
  width: 220px; height: 220px;
  border: 70px solid rgba(200,16,46,0.05); border-radius: 50%; pointer-events: none;
}
.back::after {
  content: ''; position: absolute; bottom: -60px; left: -40px;
  width: 180px; height: 180px;
  border: 50px solid rgba(201,168,76,0.04); border-radius: 50%; pointer-events: none;
}
.back-topbar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--red), var(--deep-red), transparent); }
.back-head { border-bottom: 1px solid rgba(200,16,46,0.25); padding-bottom: 12px; }
.back-codename { font-family: var(--mono); font-size: 9px; color: var(--red); letter-spacing: 0.35em; margin-bottom: 4px; }
.back-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; line-height: 1; color: #fff; }
.back-role { font-style: italic; font-size: 13px; color: var(--gold-light); margin-top: 2px; }
.bio-lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 0.35em; color: rgba(201,168,76,0.45); margin-bottom: 5px; }
.bio-txt {
  font-size: 13px; line-height: 1.65; color: rgba(232,224,208,0.82); font-weight: 300;
  display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; flex: 1;
}
.back-stats { display: flex; gap: 12px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; }
.bs { flex: 1; }
.bs-lbl { font-family: var(--mono); font-size: 7px; color: rgba(201,168,76,0.45); letter-spacing: 0.2em; text-transform: uppercase; }
.bs-val { font-family: var(--mono); font-size: 11px; color: var(--gold-light); margin-top: 2px; }
.active-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #2ecc71; margin-right: 4px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.socials { display: flex; flex-wrap: wrap; gap: 6px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
.slink {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(200,16,46,0.75); border: 1px solid rgba(200,16,46,0.3);
  padding: 4px 10px; text-decoration: none; transition: all 0.2s;
}
.slink:hover { background: var(--red); color: #fff; border-color: var(--red); }

/* FOOTER */
footer { text-align: center; padding: 50px 20px 40px; border-top: 1px solid rgba(200,16,46,0.15); }
.footer-mask { width: 48px; margin: 0 auto 16px; opacity: 0.2; }
.footer-text { font-family: var(--mono); font-size: 9px; color: rgba(232,224,208,0.2); letter-spacing: 0.4em; text-transform: uppercase; }
.footer-quote { font-style: italic; font-size: 15px; font-weight: 300; color: rgba(201,168,76,0.3); margin-top: 10px; letter-spacing: 0.1em; }
/* ══════════════════════════════
   RECORDS SECTION
══════════════════════════════ */
.records-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 32px;
  max-width: 1400px;
  margin: 48px auto 80px;
  padding: 0 32px;
}
 
.record-card {
  background: var(--dark2);
  border: 1px solid rgba(200,16,46,0.25);
  overflow: hidden;
  animation: cardIn 0.55s ease both;
  position: relative;
}
 
.record-card::before {
  content: '';
  position: absolute; top: 0; right: 0;
  border-style: solid; border-width: 0 40px 40px 0;
  border-color: transparent rgba(200,16,46,0.6) transparent transparent;
  z-index: 2;
}
 
.record-game-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.15em;
  color: #fff;
  background: linear-gradient(90deg, var(--deep-red), rgba(122,0,24,0.4));
  padding: 12px 20px;
  border-bottom: 2px solid rgba(200,16,46,0.5);
  position: relative;
}
 
.record-game-name::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0;
  width: 60px; height: 2px;
  background: var(--gold);
}
 
.record-img-wrap {
  width: 100%;
  min-height: 220px;
  background: var(--dark3);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
 
.record-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}
 
.record-card:hover .record-img {
  transform: scale(1.03);
}
 
/* Placeholder when no image added yet */
.record-img-wrap:not(:has(img[src]:not([src=""])))::after {
  content: 'ADD SCREENSHOT';
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(200,16,46,0.3);
  position: absolute;
}
/* AUTO SCALE */
img { max-width: 100%; height: auto; }
 
/* ── LARGE SCREENS 1200px ── */
@media (max-width: 1200px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}
 
/* ── TABLETS LANDSCAPE 1024px ── */
@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 24px 80px; }
  .cw { height: 440px; }
  .hero-title { font-size: clamp(60px, 12vw, 120px); }
}
 
/* ── TABLETS PORTRAIT 768px ── */
@media (max-width: 768px) {
  .grid { grid-template-columns: repeat(2, 1fr); gap: 18px; padding: 0 16px 80px; }
  .cw { height: 400px; }
  .corner-mask { width: 70px; }
  .hero-title { font-size: clamp(50px, 11vw, 100px); }
  .hero-desc { font-size: 14px; }
  .filter-wrap { gap: 6px; padding: 24px 16px 0; }
  .fbtn { padding: 8px 16px; font-size: 9px; }
  .section-head { padding: 50px 16px 16px; }
  .fname { font-size: 24px; }
  .frole { font-size: 12px; }
}
 
/* ── MOBILE LARGE 600px ── */
@media (max-width: 600px) {
  .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px 60px; }
  .cw { height: 360px; }
  .hero-title { font-size: clamp(44px, 13vw, 80px); }
  .hero-sub { font-size: 14px; letter-spacing: 0.1em; }
  .hero-desc { font-size: 13px; padding: 0 10px; }
  .classified-text { font-size: 8px; letter-spacing: 0.3em; }
  .fname { font-size: 20px; }
  .frole { font-size: 11px; }
  .back-name { font-size: 20px; }
  .bio-txt { font-size: 11px; }
  .bs-val { font-size: 10px; }
  .corner-mask { width: 50px; }
  .footer-quote { font-size: 12px; }
}
 
/* ── MOBILE SMALL 400px ── */
@media (max-width: 400px) {
  .grid { grid-template-columns: 1fr; gap: 16px; padding: 0 16px 60px; }
  .cw { height: 420px; }
  .hero-title { font-size: clamp(40px, 15vw, 70px); }
  .hero-desc { display: none; }
  .filter-wrap { gap: 8px; }
  .fbtn { padding: 8px 14px; font-size: 8px; letter-spacing: 0.15em; }
  .section-title { font-size: 36px; }
  .corner-mask { display: none; }
}

/*@media (max-width: 768px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; padding: 0 16px 80px; }
  .cw { height: 420px; }
  .stats-bar { gap: 30px; padding: 14px 20px; }
  .corner-mask { width: 60px; }
}
@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 10px 60px; }
  .cw { height: 360px; }
}*/
</style>
</head>
<body>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-mask-bg">
    <svg viewBox="0 0 400 440" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="200" cy="190" rx="155" ry="175" fill="#c8102e"/>
      <ellipse cx="200" cy="190" rx="120" ry="140" fill="#7a0018"/>
      <ellipse cx="148" cy="168" rx="34" ry="44" fill="#0a0a0a"/>
      <ellipse cx="252" cy="168" rx="34" ry="44" fill="#0a0a0a"/>

// BUILD CARDS

function buildCards(list) {
  const grid = document.getElementById('grid');
  const deptLabel = {faculty:'FACULTY', team:'team'};
  grid.innerHTML = list.map(function(m,i) {
    const photo = m.photo
      ? '<div class="photo-wrap"><img src="'+m.photo+'" alt="'+m.name+'" loading="lazy"></div>'
      : '<div class="photo-wrap"><div class="photo-placeholder">'+maskSVG(70,77)+'<span class="ph-label">ADD PHOTO</span></div></div>';
    const socials = m.social.map(function(s){ return '<a class="slink" href="'+s.u+'" target="_blank">'+s.l+'</a>'; }).join('');
    const dl = deptLabel[m.dept] || m.dept;
    return '<div class="cw" data-dept="'+m.dept+'" data-year="'+m.year+'" style="animation-delay:'+(i%8*0.06)+'s">'+
      '<div class="ci">'+
        '<div class="cf front">'+
          photo+
          '<div class="front-overlay"></div>'+
          '<div class="num-badge">'+String(i+1).padStart(2,'0')+'</div>'+
          '<div class="dept-pill">'+dl+'</div>'+
          '<div class="front-info">'+
            //'<div class="codename">'+m.codename+'</div>'+
            '<div class="fname">'+m.name+'</div>'+
            '<div class="frole">'+m.role+'</div>'+
          '</div>'+
          '<div class="mask-mini">'+maskSVG(28,31)+'</div>'+
        '</div>'+
        '<div class="cf back">'+
          '<div class="back-topbar"></div>'+
          '<div class="back-head">'+
            '<div class="back-codename">OPERATIVE · '+m.name+'</div>'+
            '<div class="back-name">'+m.name+'</div>'+
            '<div class="back-role">'+m.role+'</div>'+
          '</div>'+
          '<div><div class="bio-lbl">// PROFILE</div><p class="bio-txt">'+m.bio+'</p></div>'+
          '<div class="back-stats">'+
            '<div class="bs"><div class="bs-lbl">Year</div><div class="bs-val">'+m.year+'</div></div>'+
            '<div class="bs"><div class="bs-lbl">Domain</div><div class="bs-val">'+m.domain+'</div></div>'+
            '<div class="bs"><div class="bs-lbl">Status</div><div class="bs-val"><span class="active-dot"></span>Active</div></div>'+
          '</div>'+
          '<div class="socials">'+socials+'</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

    subFilter.style.display = 'none';
    recordsSection.style.display = 'block';
    // Show Day 1 by default
    var firstDay = recordsSection.querySelector('.sbtn');
    
    if (firstDay) showDay('day1', firstDay);
 
  } else {
    // Hide records section, show member grid
    recordsSection.style.display = 'none';
    document.getElementById('grid').style.display = 'grid';
 
    if (dept === 'faculty') {
      // Hide sub buttons
      subFilter.style.display = 'none';
      // Show only faculty cards
      document.querySelectorAll('.cw').forEach(function(c){
        c.style.display = (c.dataset.dept === 'faculty') ? 'block' : 'none';
      });
    } else {
      // Show sub buttons
      subFilter.style.display = 'flex';
      // Click first sub button by default (Final Year)
      var firstSub = document.querySelector('.sbtn');
      if (firstSub) filterYear('Final Year', firstSub);
    }
  }
}

function showDay(day, btn) {
  // Update day buttons
  document.querySelectorAll('#records-section .sbtn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  // Show selected day, hide other
  document.getElementById('day1').style.display = (day === 'day1') ? 'grid' : 'none';
  document.getElementById('day2').style.display = (day === 'day2') ? 'grid' : 'none';
}
 

// FILTER

function filterCards(dept, btn) {
  document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  document.querySelectorAll('.cw').forEach(function(c){
    c.style.display = ( c.dataset.dept === dept) ? 'block' : 'none';
  });
}


// ═══════════════════════════════════════════════
// SUB FILTER — Year inside Core Team
// ═══════════════════════════════════════════════
function filterYear(year, btn) {
  // Update sub buttons
  document.querySelectorAll('.sbtn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  // Show only team cards matching selected year
  document.querySelectorAll('.cw').forEach(function(c){
    var match = c.dataset.dept === 'team' && c.dataset.year === year;
    c.style.display = match ? 'block' : 'none';
  });
}

if (firstBtn) showMain('faculty', firstBtn);
